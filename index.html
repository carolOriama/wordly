<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Wordly</h1>
        <button id="saved-btn">Saved (0)</button>
    </header>

    <main>
        <section class="search-box">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Search for a word..." required>
                <button type="submit">Search</button>
            </form>
        </section>

        <section id="error-message" class="hidden"></section>

        <section id="results" class="hidden">
            <h2 id="word-title"></h2>
            <p id="word-phonetic"></p>
            <button id="play-btn">🔊 Play</button>

           
            <div id="meanings"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
